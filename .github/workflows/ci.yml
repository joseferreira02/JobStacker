name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jobstacker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        env:
          NODE_ENV: test
          DEV_DB_USER: test
          DEV_DB_PASS: test
          DEV_DB_NAME: jobstacker_test
          DEV_DB_HOST: localhost
          DEV_DB_PORT: 5432
        run: npx sequelize-cli db:migrate

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci
          SALT_ROUNDS: 1
          DEV_DB_USER: test
          DEV_DB_PASS: test
          DEV_DB_NAME: jobstacker_test
          DEV_DB_HOST: localhost
          DEV_DB_PORT: 5432
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
